<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#0A7AFF"/>
  <!-- Arrows suggesting bidirectional proxy traffic -->
  <g fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left-to-right arrow (top) -->
    <line x1="100" y1="180" x2="320" y2="180"/>
    <polyline points="280,140 320,180 280,220"/>
    <!-- Right-to-left arrow (bottom) -->
    <line x1="412" y1="332" x2="192" y2="332"/>
    <polyline points="232,292 192,332 232,372"/>
  </g>
  <!-- Central node dot -->
  <circle cx="256" cy="256" r="28" fill="#FFFFFF" opacity="0.9"/>
</svg>
