# oproxy configuration
# Environment variable overrides (all optional):
#   OPROXY_PORT           — listening port
#   OPROXY_BIND_HOST      — bind address (e.g. 127.0.0.1 to restrict to localhost)
#   OPROXY_MITM_ENABLED   — true/false
#   OPROXY_STORAGE_PATH   — path for persisted state
#   OPROXY_LOG_LEVEL      — trace/debug/info/warn/error (also honoured by RUST_LOG)
#   OPROXY_LOG_DIR        — directory for log files
#   OPROXY_CONFIG         — path to this file itself

# ── Network ────────────────────────────────────────────────────────────────────

port: 8080

# Bind to 0.0.0.0 to accept connections from all interfaces.
# Use 127.0.0.1 to restrict to localhost only.
bind_host: "0.0.0.0"

# ── MITM / TLS ─────────────────────────────────────────────────────────────────

mitm:
  # Set to true to intercept and inspect HTTPS traffic.
  # Requires the root CA certificate to be trusted by the client.
  enabled: true
  root_ca_path: ./certs

# ── Storage ────────────────────────────────────────────────────────────────────

storage_path: ./storage

# ── Logging ────────────────────────────────────────────────────────────────────

log:
  # Minimum log level: trace, debug, info, warn, error.
  # RUST_LOG or OPROXY_LOG_LEVEL env vars take precedence.
  level: info
  # Directory where rolling log files are written (one file per day).
  dir: .
  # Log file name prefix. Date suffix is appended automatically.
  file: server.log

# ── Upstream behaviour ─────────────────────────────────────────────────────────

# Upstream request timeout in seconds.
timeout_secs: 30

# Maximum request/response body buffered in memory, in bytes (default: 10 MB).
max_body_bytes: 10485760

# Connection pool settings for upstream keep-alive.
pool_max_idle_per_host: 10
pool_idle_timeout_secs: 30

# ── Traffic log ────────────────────────────────────────────────────────────────

# Maximum sessions retained in the in-memory traffic log.
max_sessions: 10000
