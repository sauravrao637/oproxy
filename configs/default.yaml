# oproxy configuration
# Environment variable overrides (all optional):
#   OPROXY_PORT           - listening port
#   OPROXY_BIND_HOST      - bind address (e.g. 127.0.0.1 to restrict to localhost)
#   OPROXY_MITM_ENABLED   - true/false
#   OPROXY_STORAGE_PATH   - path for persisted state
#   OPROXY_LOG_LEVEL      - trace/debug/info/warn/error (also honoured by RUST_LOG)
#   OPROXY_LOG_DIR        - directory for log files
#   OPROXY_ALLOW_REMOTE_ADMIN - true/false; expose management UI/API on non-loopback hosts
#   OPROXY_ADMIN_TOKEN    - optional management UI/API token
#   OPROXY_ALLOW_PRIVATE_ADMIN_EGRESS - true/false; allow remote-admin forward/webhook to private IPs
#   OPROXY_MAX_CONNECTIONS - maximum concurrent downstream connections
#   OPROXY_CONNECT_TIMEOUT_SECS - TCP connect timeout for tunnels
#   OPROXY_HANDSHAKE_TIMEOUT_SECS - TLS/SOCKS handshake timeout
#   OPROXY_SHUTDOWN_GRACE_SECS - graceful shutdown drain period
#   OPROXY_CONFIG         - path to this file itself

# ── Network ────────────────────────────────────────────────────────────────────

port: 8080

# Local-only by default. Set OPROXY_BIND_HOST=0.0.0.0 only when you
# intentionally want LAN clients to reach this proxy. Management remains
# loopback-only unless allow_remote_admin is also set.
bind_host: "127.0.0.1"

# Management UI/API is loopback-only by default even when the proxy binds to
# 0.0.0.0. Set this true only for trusted networks, preferably with admin_token.
allow_remote_admin: false

# Optional shared secret for management UI/API. Clients may send it as
# x-oproxy-admin-token, Authorization: Bearer, cookie, or ?token=...
admin_token:

# When remote admin is enabled, admin-initiated outbound requests such as
# /admin/forward and webhooks cannot target private, loopback, link-local,
# multicast, or unspecified IP ranges unless this is explicitly set true.
allow_private_admin_egress: false

# ── MITM / TLS ─────────────────────────────────────────────────────────────────

mitm:
  # Set to true to intercept and inspect HTTPS traffic.
  # Requires the root CA certificate to be trusted by the client.
  enabled: true
  root_ca_path: ./certs

# ── Storage ────────────────────────────────────────────────────────────────────

storage_path: ./storage

# ── Logging ────────────────────────────────────────────────────────────────────

log:
  # Minimum log level: trace, debug, info, warn, error.
  # RUST_LOG or OPROXY_LOG_LEVEL env vars take precedence.
  level: info
  # Directory where rolling log files are written (one file per day).
  dir: .
  # Log file name prefix. Date suffix is appended automatically.
  file: server.log

# ── Upstream behaviour ─────────────────────────────────────────────────────────

# Upstream request timeout in seconds.
timeout_secs: 30

# TCP connect timeout for CONNECT, SOCKS5, and WebSocket upstream dials.
connect_timeout_secs: 10

# Timeout for client-side SOCKS5 and TLS handshake phases.
handshake_timeout_secs: 10

# Grace period for listener tasks and accepted connections during shutdown.
shutdown_grace_secs: 10

# Maximum request/response body buffered in memory, in bytes (default: 10 MB).
max_body_bytes: 10485760

# Connection pool settings for upstream keep-alive.
pool_max_idle_per_host: 10
pool_idle_timeout_secs: 30

# Maximum concurrent accepted downstream connections across all listeners.
max_connections: 1024

# ── SOCKS5 listener ────────────────────────────────────────────────────────────

# Uncomment to enable a SOCKS5 proxy listener on this port.
# Supports CONNECT tunnelling with optional MITM TLS interception.
socks5_port: 1080

# ── Traffic log ────────────────────────────────────────────────────────────────

# Maximum sessions retained in the in-memory traffic log.
max_sessions: 10000

# Approximate request/response body bytes retained across sessions.
# Older bodies are discarded first while session metadata remains available.
max_retained_body_bytes: 67108864
