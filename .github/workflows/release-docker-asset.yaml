name: Release Multi-Arch Docker Image

on:
  release:
    types: [published] # Triggers when you hit "Publish" on a new release
  workflow_dispatch:

jobs:
  build-and-push-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Grants permission to push to the registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs the emulator needed to build Apple Silicon (arm64) code on an Ubuntu runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Activates the advanced multi-arch builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Silently logs into the free GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the image for both chips and pushes it live
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/oproxy:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository_owner }}/oproxy:latest