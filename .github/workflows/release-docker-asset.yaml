name: Release Multi-Arch Docker Image

on:
  release:
    types: [published] # Triggers when you hit "Publish" on a new release
  workflow_dispatch:

jobs:
  build-and-push-ghcr:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write # Grants permission to push to the registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/design/package-lock.json

      - name: Build UI
        run: |
          npm ci --prefix src/design
          npm run build --prefix src/design

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust tests
        run: RUSTFLAGS="-D warnings" cargo test

      - name: Runtime asset sanity
        run: |
          test -f src/design/dist/index.html
          test -f src/design/dist/assets/app.js
          test -f src/design/dist/assets/app.css
          ! grep -R "text/babel\\|unpkg\\|cdn.jsdelivr\\|fonts.googleapis\\|fonts.gstatic" src/design/dist src/management.rs
          ! grep -R "Trust status\\|oproxy probes the OS keychain\\|Command palette\\|command palette\\|Save session log\\|Pause / resume recording" src/design/dist

      - name: Resolve image tag
        id: image
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ github.repository_owner }}/oproxy:${{ github.event.release.tag_name }}"
              echo "ghcr.io/${{ github.repository_owner }}/oproxy:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${{ github.repository_owner }}/oproxy:manual-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      # Installs the emulator needed to build Apple Silicon (arm64) code on an Ubuntu runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Activates the advanced multi-arch builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Silently logs into the free GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the image for both chips and pushes it live
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
